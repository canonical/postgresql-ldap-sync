name: Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-workflows:
    name: Lint .github/workflows/
    uses: canonical/data-platform-workflows/.github/workflows/lint_workflows.yaml@v49.0.2
    permissions:
      contents: read

  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "Install binaries"
        run: |
          sudo apt update
          sudo apt install libldap2-dev
          sudo apt install libsasl2-dev
      - name: "Install poetry & tox"
        run: |
          pipx install poetry
          pipx install tox
      - name: "Run linters"
        run: tox run -e lint
    permissions: {}

  test-unit:
    name: "Run unit tests"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "Install binaries"
        run: |
          sudo apt update
          sudo apt install libldap2-dev
          sudo apt install libsasl2-dev
      - name: "Install poetry & tox"
        run: |
          pipx install poetry
          pipx install tox
      - name: "Run tests"
        run: tox run -e unit
    permissions: {}

  test-integration:
    name: "Run integration tests"
    needs:
      - lint-workflows
      - lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - postgres: { version: "16" }
          - postgres: { version: "18" }
    env:
      GLAUTH_USERNAME: cn=serviceuser,ou=svcaccts,dc=glauth,dc=com
      GLAUTH_PASSWORD: dogood
      POSTGRES_DATABASE: postgres
      POSTGRES_USERNAME: postgres_ldap_sync
      POSTGRES_PASSWORD: postgres_ldap_sync
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "Install binaries"
        run: |
          sudo apt update
          sudo apt install libldap2-dev
          sudo apt install libsasl2-dev
      - name: "Install poetry & tox"
        run: |
          pipx install poetry
          pipx install tox
      - name: "Start services"
        run: docker compose -f compose/postgresql-${{ matrix.postgres.version }}.yaml up --wait
      - name: "Run tests"
        run: tox run -e integration
      - name: "Stop services"
        run: docker compose -f compose/postgresql-${{ matrix.postgres.version }}.yaml down
    permissions: {}
